services:
  - type: web
    name: payload-custom-admin-workbench
    env: docker
    plan: starter
    region: frankfurt
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: payload-custom-admin-postgres
          property: connectionString
      - key: POSTGRES_URL
        fromDatabase:
          name: payload-custom-admin-postgres
          property: connectionString
      - key: PAYLOAD_SECRET
        generateValue: true
      - key: PAYLOAD_ADMIN_EMAIL
        value: dev@payloadcms.com
      - key: PAYLOAD_ADMIN_PASSWORD
        sync: false
      - key: PAYLOAD_DB_PUSH
        value: 'true'

databases:
  - name: payload-custom-admin-postgres
    databaseName: payload
    user: payload
    plan: starter
