services:
  - type: web
    name: payload-ai-tester-workbench
    env: docker
    plan: starter
    region: frankfurt
    healthCheckPath: /ai
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: payload-ai-tester-postgres
          property: connectionString
      - key: POSTGRES_URL
        fromDatabase:
          name: payload-ai-tester-postgres
          property: connectionString
      - key: PAYLOAD_SECRET
        generateValue: true
      - key: PAYLOAD_ADMIN_EMAIL
        value: dev@payloadcms.com
      - key: PAYLOAD_ADMIN_PASSWORD
        sync: false
      - key: PAYLOAD_DB_PUSH
        value: 'true'
      - key: AI_DOCS_DIR
        value: /app/docs
      - key: LM_STUDIO_BASE_URL
        sync: false
      - key: LM_STUDIO_NATIVE_BASE_URL
        sync: false
      - key: LM_STUDIO_MODEL
        value: qwen/qwen3.6-35b-a3b
      - key: LM_STUDIO_EMBEDDING_MODEL
        value: text-embedding-bge-m3

databases:
  - name: payload-ai-tester-postgres
    databaseName: payload
    user: payload
    plan: starter
