services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://payload:payload@postgres:5432/payload
      PAYLOAD_ADMIN_EMAIL: ${PAYLOAD_ADMIN_EMAIL:-dev@payloadcms.com}
      PAYLOAD_ADMIN_PASSWORD: ${PAYLOAD_ADMIN_PASSWORD:-test}
      PAYLOAD_DB_PUSH: ${PAYLOAD_DB_PUSH:-true}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-local-dev-secret-change-me}
      PORT: 3000
    ports:
      - ${APP_PORT:-3000}:3000

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_USER: payload
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payload -d payload']
      interval: 2s
      retries: 30
      start_period: 5s
      timeout: 5s
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
